<!DOCTYPE html>
<html lang="es">

<head>

    <title>Modelo de cajas - CSS</title>
    <!-- Link css -->
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>

        <p class="centrado">Aprende a estructurar y diseñar con css. <a href="#">Descubre más aquí.</a> </p>

    <main class="container">

        <div class="caja">
            <div class="encabezado_caja azul">
                <h3 class="centrado">🎮Videojuegos</h3>

                <p class="centrado">🆗Caja azul - Ideal para encabezados</p>

            </div>
        </div>

        <div class="caja rojo">
            <p class="centrado">⛔Caja Roja - Perfecta para alertas</p>
        </div>
        <div class="caja verde">
            <p class="centrado">✅Caja verde - Para mensajes de éxito</p>
        </div>
    </main>
    <!-- Conexión con JS -->
    <script src="static/js/script.js"></script>
