<!DOCTYPE html>
<html lang="es">

<head> <!-- Configuración de la página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
</head>

<body> <!-- Cuerpo del documento -->
    <header> <!-- Encabezado de la página -->
        <h1>Iniciar sesión</h1>
        <nav> <!-- Barra de navegación con enlaces -->
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Nosotros</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <main> <!-- Sección principal de la página -->
        <section>
            <article> <!-- Artículo con información específica  -->
                <h2>Hola soy un artículo!</h2>
                <hr>
                <p>Parrafo de un artículo</p>
            </article>
        </section>
        <section> <!-- Contenedor al igual que un div -->
            <form action="/login" method="post">
                <div>
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div>
                    <input type="checkbox" id="recordarme" name="recordarme">
                    <label for="recordarme">Recordarme</label>
                </div>
                <button type="submit">Ingresar</button>
            </form>
        </section>
    </main>
    <footer style="text-align: center;">
        <hr>
        <p>Todos los derechos reservados.</p>
    </footer>
</body>

</html>
