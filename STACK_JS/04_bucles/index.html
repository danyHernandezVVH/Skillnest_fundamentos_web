<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucles en JS</title>

    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <div class="contenedor">

        <h1>Práctica de Bucles</h1>

        <div class="card">
            <h2>Ejemplo for 1</h2>
            <p>Contar hasta 5</p>
            <button onclick="contarHasta5()">Ejecutar</button>
        </div>
        <div class="card">
            <h2>Ejemplo for 2</h2>
            <p>Cuenta regresiva</p>
            <button onclick="cuentaRegresiva()">Ejecutar</button>
        </div>
        <div class="card">
            <h2>Ejemplo for 3</h2>
            <p>Recorrer una lista de usuarios</p>
            <button onclick="recorrerLista()">Ejecutar</button>
        </div>
        <hr>
        <div class="card">
            <h2>Ejemplo while 1</h2>
            <p>Bucle While con boolean</p>
            <button onclick="reproducirCancion()">Ejecutar</button>
        </div>
        <div class="card">
            <h2>Ejemplo while 2</h2>
            <p>Carga de datos</p>
            <button onclick="cargarDatos()">Ejecutar</button>
        </div>
        <div class="card">
            <h2>Ejemplo while 3</h2>
            <p>Validación de contraseña</p>
            <button onclick="validarContrasena()">Ejecutar</button>
        </div>

        <script src="static/js/script.js"></script>

</body>

</html>
