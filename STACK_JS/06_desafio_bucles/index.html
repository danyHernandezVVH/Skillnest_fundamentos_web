<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Desafío de bucles</title>
    <!-- link css -->
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <div class="contenedor">

        <h1> Desafío Bucles</h1>

        <div class="card">
            <h2>Ejercicio 1</h2>
            <p>Conteo de interacciones</p>
            <button onclick="contarInteracciones()">Ejecutar</button>
        </div>
        <div class="card">
            <h2>Ejercicio 2</h2>
            <p>Simular una barra de carga</p>
            <button onclick="simularBarra()">Ejecutar</button>
        </div>

        <div class="card">
            <h2>Ejercicio 3</h2>
            <p>Simular de descuento</p>
            <button onclick="calcularDescuento()">Ejecutar</button>
        </div>

        <div class="card">
            <h2>Ejercicio 4</h2>
            <p>Simulador de calcular puntos</p>
            <button onclick="calcularPuntos()">Ejecutar</button>
        </div>

        <div class="card">
            <h2>Ejercicio 5</h2>
            <p>Contador de Notificaciones</p>
            <button onclick="ContadorNotificaciones()">Ejecutar</button>
        </div>

        <script src="static/js/script.js"></script>

</body>

</html>
